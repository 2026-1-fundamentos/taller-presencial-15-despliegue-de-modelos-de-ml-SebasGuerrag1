<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronosticador de precios de casas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        h1 {
            text-align: center;
        }
        form {
            display: grid;
            gap: 12px;
        }
        label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-weight: bold;
        }
        input, select {
            padding: 8px;
            font-size: 16px;
        }
        button {
            margin-top: 12px;
            padding: 12px;
            font-size: 16px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .result {
            margin-top: 24px;
            padding: 16px;
            background: #ecfdf5;
            border: 1px solid #6ee7b7;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>Pronosticador de precios de casas</h1>
    <form method="post">
        <label>
            Habitaciones
            <input type="number" name="bedrooms" min="0" value="3" required>
        </label>
        <label>
            Baños
            <input type="number" name="bathrooms" min="0" step="0.25" value="2" required>
        </label>
        <label>
            Área habitable (sqft)
            <input type="number" name="sqft_living" min="0" value="1800" required>
        </label>
        <label>
            Área del lote (sqft)
            <input type="number" name="sqft_lot" min="0" value="5000" required>
        </label>
        <label>
            Pisos
            <input type="number" name="floors" min="0" step="0.5" value="1" required>
        </label>
        <label>
            Frente al agua
            <select name="waterfront">
                <option value="0">No</option>
                <option value="1">Sí</option>
            </select>
        </label>
        <label>
            Condición
            <input type="number" name="condition" min="1" max="5" value="4" required>
        </label>
        <button type="submit">Calcular precio</button>
    </form>

    {% if prediction is not none %}
    <div class="result">
        Precio estimado: ${{ "{:,.2f}".format(prediction) }}
    </div>
    {% endif %}
</body>
</html>
